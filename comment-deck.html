<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#17111f; --bg2:#1f1729; --card:#271d34; --card2:#2f2340;
    --ink:#f4eff5; --muted:#a99bb5; --faint:#6f6280;
    --amber:#f5b942; --mint:#5ce0c6; --coral:#ff6b8a;
    --line:rgba(255,255,255,0.08); --line2:rgba(255,255,255,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #2a1c3a 0%, var(--bg) 55%) fixed;
    color:var(--ink); font-family:"Inter",system-ui,sans-serif;
    min-height:100vh; padding:20px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px; margin:0 auto;}

  /* Header */
  header{display:flex; align-items:center; gap:14px; margin-bottom:22px;}
  .mark{
    width:40px; height:40px; border-radius:11px; flex:none;
    background:linear-gradient(145deg,var(--amber),var(--coral));
    display:grid; place-items:center; color:#2a1730; box-shadow:0 6px 20px rgba(245,107,138,.28);
  }
  .mark svg{width:22px;height:22px;}
  h1{font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:1.5rem; letter-spacing:-.02em; margin:0; line-height:1;}
  .sub{font-family:"Space Mono",monospace; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-top:4px;}
  .gear{margin-left:auto; background:none; border:1px solid var(--line); color:var(--muted); width:40px;height:40px;border-radius:11px; cursor:pointer; display:grid;place-items:center; transition:.15s;}
  .gear:hover{border-color:var(--line2); color:var(--ink);}
  .gear svg{width:18px;height:18px;}

  /* Controls */
  .controls{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  input[type=text]{
    flex:1 1 220px; min-width:0; background:var(--bg2); border:1px solid var(--line);
    color:var(--ink); padding:12px 14px; border-radius:12px; font-size:.95rem; font-family:inherit;
    transition:.15s;
  }
  input[type=text]::placeholder{color:var(--faint);}
  input[type=text]:focus{outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,185,66,.15);}
  button.act{
    background:var(--amber); color:#2a1730; border:none; padding:12px 20px; border-radius:12px;
    font-weight:700; font-size:.95rem; cursor:pointer; font-family:inherit; white-space:nowrap; transition:.15s;
  }
  button.act:hover{filter:brightness(1.06);}
  button.act:disabled{opacity:.5; cursor:default; filter:none;}

  .recent-row{display:flex; align-items:center; gap:10px; margin-bottom:20px;}
  select{
    background:var(--bg2); border:1px solid var(--line); color:var(--muted); padding:9px 12px;
    border-radius:10px; font-family:"Space Mono",monospace; font-size:.78rem; cursor:pointer; max-width:100%;
  }
  select:focus{outline:none; border-color:var(--line2);}
  .recent-lbl{font-family:"Space Mono",monospace; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--faint);}

  /* Key panel */
  .keypanel{
    background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:20px;
    display:none;
  }
  .keypanel.show{display:block;}
  .keypanel p{margin:0 0 12px; font-size:.85rem; color:var(--muted); line-height:1.5;}
  .keypanel .krow{display:flex; gap:10px; flex-wrap:wrap;}
  .btn-ghost{background:none; border:1px solid var(--line2); color:var(--muted); padding:11px 16px; border-radius:11px; cursor:pointer; font-family:inherit; font-size:.9rem; transition:.15s;}
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink);}

  /* Stage */
  .stage{position:relative; min-height:340px; display:flex; align-items:center; gap:6px;}
  .nav{
    flex:none; width:44px; height:44px; border-radius:50%; border:1px solid var(--line2);
    background:var(--card); color:var(--ink); cursor:pointer; display:grid; place-items:center; transition:.15s;
    z-index:3;
  }
  .nav:hover:not(:disabled){background:var(--card2); border-color:var(--amber);}
  .nav:disabled{opacity:.25; cursor:default;}
  .nav svg{width:20px;height:20px;}

  .cardhold{flex:1; position:relative; min-height:320px; display:grid; place-items:center;}
  /* stacked deck effect */
  .cardhold::before,.cardhold::after{
    content:""; position:absolute; inset:14px 8px; border-radius:18px; background:var(--card);
    border:1px solid var(--line); z-index:0;
  }
  .cardhold::after{inset:7px 4px; z-index:1;}
  .cardhold.empty::before,.cardhold.empty::after{display:none;}

  .card{
    position:relative; z-index:2; width:100%; background:linear-gradient(160deg,var(--card2),var(--card));
    border:1px solid var(--line2); border-radius:18px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.4);
  }
  .card-top{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
  .avatar{width:46px;height:46px;border-radius:50%; flex:none; object-fit:cover; background:var(--bg2); border:1px solid var(--line);}
  .avatar-fallback{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:1.2rem;color:#2a1730;background:linear-gradient(145deg,var(--mint),var(--amber));}
  .who{min-width:0;}
  .name{font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:1.15rem; letter-spacing:-.01em; line-height:1.15; overflow-wrap:anywhere;}
  .when{font-family:"Space Mono",monospace; font-size:.7rem; color:var(--faint); margin-top:2px;}
  .likes{margin-left:auto; flex:none; display:flex; align-items:center; gap:6px; color:var(--coral); font-weight:600; font-family:"Space Mono",monospace; font-size:.9rem;}
  .likes svg{width:16px;height:16px;}
  .rank{
    position:absolute; top:-12px; left:20px; font-family:"Space Mono",monospace; font-weight:700;
    font-size:.7rem; letter-spacing:.1em; background:var(--amber); color:#2a1730; padding:3px 9px; border-radius:20px;
  }
  .comment{font-size:1.15rem; line-height:1.55; color:var(--ink); overflow-wrap:anywhere; max-height:220px; overflow:auto; white-space:pre-wrap;}

  .placeholder{text-align:center; color:var(--faint); padding:40px 20px;}
  .placeholder .big{font-family:"Bricolage Grotesque",sans-serif; font-size:1.1rem; color:var(--muted); margin-bottom:6px;}
  .placeholder .lil{font-size:.85rem;}

  /* Pager foot */
  .foot{display:flex; align-items:center; gap:14px; margin-top:18px; min-height:24px; flex-wrap:wrap;}
  .dots{display:flex; gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint); opacity:.5; cursor:pointer; transition:.15s; border:none; padding:0;}
  .dot.on{background:var(--amber); opacity:1; transform:scale(1.25);}
  .counter{font-family:"Space Mono",monospace; font-size:.85rem; color:var(--muted); letter-spacing:.05em;}
  .copybtn{margin-left:auto; background:none; border:1px solid var(--line2); color:var(--mint); padding:9px 15px; border-radius:11px; cursor:pointer; font-family:inherit; font-size:.85rem; font-weight:600; transition:.15s;}
  .copybtn:hover{background:rgba(92,224,198,.1); border-color:var(--mint);}
  .copybtn:disabled{opacity:.35; cursor:default;}

  .status{font-family:"Space Mono",monospace; font-size:.8rem; color:var(--faint); margin-top:14px; min-height:18px; text-align:center;}
  .status.err{color:var(--coral);}
  .status.ok{color:var(--mint);}

  @media (prefers-reduced-motion: no-preference){
    .card{animation:pop .22s ease;}
    @keyframes pop{from{opacity:0; transform:translateY(6px) scale(.99);} to{opacity:1;transform:none;}}
  }
  @media (max-width:520px){
    .comment{font-size:1.05rem;} .nav{width:38px;height:38px;} h1{font-size:1.3rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    <div>
      <h1>Comment Deck</h1>
      <div class="sub">Top 10 · by likes</div>
    </div>
    <button class="gear" id="gearBtn" title="API key settings" aria-label="API key settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div class="keypanel" id="keyPanel">
    <p>Paste your <strong>YouTube Data API v3</strong> key. It's stored only in this tool on your device. For safety, restrict the key in Google Cloud to the YouTube Data API.</p>
    <div class="krow">
      <input type="text" id="keyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
      <button class="act" id="saveKey">Save key</button>
      <button class="btn-ghost" id="forgetKey">Forget</button>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="videoInput" placeholder="Paste video URL or ID — the one you're pulling comments from" autocomplete="off" spellcheck="false">
    <button class="act" id="pullBtn">Pull top 10</button>
  </div>

  <div class="recent-row">
    <span class="recent-lbl">Recent</span>
    <select id="recentSel"><option value="">— pulled videos —</option></select>
  </div>

  <div class="stage">
    <button class="nav" id="prevBtn" aria-label="Previous comment" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="cardhold empty" id="cardHold">
      <div class="placeholder" id="placeholder">
        <div class="big">No deck loaded</div>
        <div class="lil">Paste a video above and pull its top comments.</div>
      </div>
    </div>
    <button class="nav" id="nextBtn" aria-label="Next comment" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="foot">
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter"></div>
    <button class="copybtn" id="copyBtn" disabled>Copy all 10</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const API = "https://www.googleapis.com/youtube/v3/";
  let deck = [];        // current comments
  let idx = 0;          // current card
  let currentTitle = "";

  // ---------- storage helpers (graceful if unavailable) ----------
  async function sGet(key){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }
    catch(e){ return null; }
  }
  async function sSet(key,val){
    try{ await window.storage.set(key, val); }catch(e){}
  }
  async function sDel(key){ try{ await window.storage.delete(key); }catch(e){} }

  // ---------- key handling ----------
  async function getKey(){ return await sGet("yt_api_key"); }
  async function refreshKeyUI(){
    const k = await getKey();
    if(!k){ $("keyPanel").classList.add("show"); }
    return k;
  }
  $("gearBtn").onclick = async ()=>{
    const p = $("keyPanel");
    p.classList.toggle("show");
    if(p.classList.contains("show")){
      const k = await getKey();
      $("keyInput").value = k ? k : "";
      $("keyInput").focus();
    }
  };
  $("saveKey").onclick = async ()=>{
    const v = $("keyInput").value.trim();
    if(!v){ setStatus("Key can't be empty.","err"); return; }
    await sSet("yt_api_key", v);
    $("keyPanel").classList.remove("show");
    setStatus("Key saved.","ok");
  };
  $("forgetKey").onclick = async ()=>{
    await sDel("yt_api_key");
    $("keyInput").value = "";
    setStatus("Key removed.","");
    $("keyPanel").classList.add("show");
  };

  // ---------- util ----------
  function parseVideoId(raw){
    raw = (raw||"").trim();
    if(!raw) return "";
    // bare id (11 chars typical)
    if(/^[A-Za-z0-9_-]{11}$/.test(raw)) return raw;
    try{
      const u = new URL(raw);
      if(u.hostname.includes("youtu.be")) return u.pathname.slice(1).split("/")[0];
      if(u.searchParams.get("v")) return u.searchParams.get("v");
      const parts = u.pathname.split("/");
      const i = parts.findIndex(p=>["shorts","embed","live","v"].includes(p));
      if(i>=0 && parts[i+1]) return parts[i+1];
    }catch(e){}
    const m = raw.match(/[A-Za-z0-9_-]{11}/);
    return m ? m[0] : raw;
  }
  function timeAgo(iso){
    const d = new Date(iso), now = new Date();
    const s = Math.floor((now-d)/1000);
    const u = [["year",31536000],["month",2592000],["week",604800],["day",86400],["hour",3600],["minute",60]];
    for(const [name,secs] of u){
      const n = Math.floor(s/secs);
      if(n>=1) return n+" "+name+(n>1?"s":"")+" ago";
    }
    return "just now";
  }
  function setStatus(msg,cls){
    const el = $("status"); el.textContent = msg||"";
    el.className = "status" + (cls?(" "+cls):"");
  }
  function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

  // ---------- fetch ----------
  async function fetchTitle(id,key){
    try{
      const r = await fetch(`${API}videos?part=snippet&id=${id}&key=${key}`);
      const j = await r.json();
      if(j.items && j.items[0]) return j.items[0].snippet.title;
    }catch(e){}
    return "";
  }
  async function fetchComments(id,key){
    let all = [], page = "", pages = 0;
    while(pages < 3){
      const url = `${API}commentThreads?part=snippet&videoId=${id}&maxResults=100&order=relevance${page?`&pageToken=${page}`:""}&key=${key}`;
      const r = await fetch(url);
      const j = await r.json();
      if(j.error){ throw new Error(j.error.message || "API error"); }
      (j.items||[]).forEach(it=>{
        const c = it.snippet.topLevelComment.snippet;
        all.push({
          name: c.authorDisplayName,
          avatar: c.authorProfileImageUrl,
          text: c.textOriginal || c.textDisplay || "",
          likes: c.likeCount || 0,
          when: c.publishedAt
        });
      });
      if(!j.nextPageToken) break;
      page = j.nextPageToken; pages++;
    }
    all.sort((a,b)=> b.likes - a.likes);
    return all.slice(0,10);
  }

  // ---------- pull ----------
  async function pull(){
    const key = await getKey();
    if(!key){ $("keyPanel").classList.add("show"); setStatus("Add your API key first (gear icon).","err"); return; }
    const id = parseVideoId($("videoInput").value);
    if(!id){ setStatus("Couldn't read a video ID from that.","err"); return; }

    $("pullBtn").disabled = true; setStatus("Pulling comments…","");
    try{
      const [comments,title] = await Promise.all([ fetchComments(id,key), fetchTitle(id,key) ]);
      if(!comments.length){ setStatus("No comments found (they may be disabled on this video).","err"); $("pullBtn").disabled=false; return; }
      deck = comments; idx = 0; currentTitle = title || id;
      await saveDeck(id, title, comments);
      render();
      setStatus(`Loaded ${comments.length} — ${title||id}`,"ok");
    }catch(e){
      setStatus("Error: "+e.message,"err");
    }
    $("pullBtn").disabled = false;
  }

  // ---------- persistence of decks ----------
  async function saveDeck(id,title,comments){
    await sSet("deck:"+id, JSON.stringify({title,comments,at:Date.now()}));
    let index = [];
    const raw = await sGet("deck_index");
    if(raw){ try{ index = JSON.parse(raw); }catch(e){} }
    index = index.filter(x=>x.id!==id);
    index.unshift({id, title: title||id, at: Date.now()});
    index = index.slice(0,40);
    await sSet("deck_index", JSON.stringify(index));
    populateRecent(index);
  }
  async function loadIndex(){
    const raw = await sGet("deck_index");
    if(raw){ try{ populateRecent(JSON.parse(raw)); }catch(e){} }
  }
  function populateRecent(index){
    const sel = $("recentSel");
    sel.innerHTML = '<option value="">— pulled videos —</option>';
    index.forEach(x=>{
      const o = document.createElement("option");
      o.value = x.id;
      const t = x.title.length>52 ? x.title.slice(0,52)+"…" : x.title;
      o.textContent = t;
      sel.appendChild(o);
    });
  }
  $("recentSel").onchange = async (e)=>{
    const id = e.target.value; if(!id) return;
    const raw = await sGet("deck:"+id);
    if(!raw){ setStatus("That deck isn't saved anymore.","err"); return; }
    try{
      const d = JSON.parse(raw);
      deck = d.comments; idx = 0; currentTitle = d.title||id;
      render();
      setStatus(`Reopened — ${d.title||id}`,"ok");
    }catch(err){ setStatus("Couldn't open that deck.","err"); }
  };

  // ---------- render ----------
  function render(){
    const hold = $("cardHold");
    if(!deck.length){
      hold.classList.add("empty");
      hold.innerHTML = '<div class="placeholder"><div class="big">No deck loaded</div><div class="lil">Paste a video above and pull its top comments.</div></div>';
      $("dots").innerHTML=""; $("counter").textContent=""; $("copyBtn").disabled=true;
      $("prevBtn").disabled=true; $("nextBtn").disabled=true;
      return;
    }
    hold.classList.remove("empty");
    const c = deck[idx];
    const avatar = c.avatar
      ? `<img class="avatar" src="${esc(c.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'avatar-fallback\\'>${esc((c.name||'?').charAt(0).toUpperCase())}</div>'">`
      : `<div class="avatar-fallback">${esc((c.name||"?").charAt(0).toUpperCase())}</div>`;
    hold.innerHTML = `
      <div class="card">
        <div class="rank">#${idx+1} of ${deck.length}</div>
        <div class="card-top">
          ${avatar}
          <div class="who">
            <div class="name">${esc(c.name)}</div>
            <div class="when">${esc(timeAgo(c.when))}</div>
          </div>
          <div class="likes"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-8-4.5-8-10a4.5 4.5 0 0 1 8-2.9A4.5 4.5 0 0 1 20 11c0 5.5-8 10-8 10z"/></svg>${c.likes.toLocaleString()}</div>
        </div>
        <div class="comment">${esc(c.text)}</div>
      </div>`;
    // dots
    const dots = $("dots"); dots.innerHTML="";
    deck.forEach((_,i)=>{
      const b = document.createElement("button");
      b.className = "dot"+(i===idx?" on":"");
      b.setAttribute("aria-label","Go to comment "+(i+1));
      b.onclick = ()=>{ idx=i; render(); };
      dots.appendChild(b);
    });
    $("counter").textContent = String(idx+1).padStart(2,"0")+" / "+String(deck.length).padStart(2,"0");
    $("copyBtn").disabled=false;
    $("prevBtn").disabled = idx===0;
    $("nextBtn").disabled = idx===deck.length-1;
  }

  $("prevBtn").onclick = ()=>{ if(idx>0){idx--; render();} };
  $("nextBtn").onclick = ()=>{ if(idx<deck.length-1){idx++; render();} };
  document.addEventListener("keydown",(e)=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
    if(e.key==="ArrowLeft" && idx>0){ idx--; render(); }
    if(e.key==="ArrowRight" && idx<deck.length-1){ idx++; render(); }
  });

  $("copyBtn").onclick = ()=>{
    if(!deck.length) return;
    const lines = deck.map((c,i)=>`${i+1}. ${c.name} (${c.likes} likes)\n   ${c.text}`);
    const txt = `Top ${deck.length} comments — ${currentTitle}\n\n`+lines.join("\n\n");
    navigator.clipboard.writeText(txt).then(
      ()=> setStatus("Copied all "+deck.length+" to clipboard.","ok"),
      ()=> setStatus("Couldn't copy — clipboard blocked.","err")
    );
  };

  $("pullBtn").onclick = pull;
  $("videoInput").addEventListener("keydown", e=>{ if(e.key==="Enter") pull(); });

  // init
  refreshKeyUI();
  loadIndex();
})();
</script>
</body>
</html>
